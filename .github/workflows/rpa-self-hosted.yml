name: 🤖 RPA - Busca Artigos a Cada Hora (Self-Hosted)

on:
  schedule:
    # Roda a cada 1 hora, 0 minutos
    - cron: '0 * * * *'
  workflow_dispatch:  # Permite rodar manualmente no GitHub

jobs:
  rpa-busca-artigos:
    runs-on: self-hosted
    timeout-minutes: 30
    
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Configurar Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: bash
      
      - name: 📥 Buscar novos artigos por tema
        run: |
          cd artigos_pdf_12_meses
          python atualizar_artigos_temas.py
        shell: bash
        env:
          TZ: America/Sao_Paulo
      
      - name: 📊 Classificar artigos por Qualis
        run: |
          cd artigos_pdf_12_meses
          python atualizar_qualis_em_todos.py
        shell: bash
      
      - name: 📤 Fazer commit e push das mudanças
        run: |
          git config --local user.email "rpa-github-actions@bot.local"
          git config --local user.name "RPA Bot"
          
          # Verifica se há mudanças
          if git diff --quiet; then
            echo "✅ Nenhuma mudança detectada"
          else
            git add artigos_pdf_12_meses/artigos_oa.csv artigos_pdf_12_meses/resultado_download.csv artigos_pdf_12_meses/.last_openalex_fetch.txt 2>/dev/null || true
            git commit -m "🤖 Atualização automática: novos artigos e classificação Qualis [$(date +'%d/%m/%Y %H:%M')]" || true
            git push origin master || true
          fi
        shell: bash
      
      - name: ✅ Log de Execução
        if: always()
        run: |
          echo "╔════════════════════════════════════════╗"
          echo "║  ✅ RPA Executado com Sucesso         ║"
          echo "║  Timestamp: $(date '+%d/%m/%Y %H:%M:%S')  ║"
          echo "║  Branch: $(git rev-parse --abbrev-ref HEAD)                       ║"
          echo "╚════════════════════════════════════════╝"
        shell: bash
